name: arxiv-trends
channels:
  - conda-forge
dependencies:
  - python=3.11
  # Core data science
  - numpy
  - pandas
  - scikit-learn
  - scipy
  - statsmodels
  # Visualization
  - matplotlib
  - seaborn
  - plotly
  # Text processing
  - spacy
  - gensim
  # Dimensionality reduction & clustering
  - umap-learn
  - hdbscan
  # Data collection
  - arxiv
  # LLM labeling
  - anthropic
  - pydantic
  # Environment
  - python-dotenv
  - jupyterlab
  # Pip-only packages
  - pip
  - pip:
      - sentence-transformers
      - wordcloud
      - ruff
      - pre-commit
